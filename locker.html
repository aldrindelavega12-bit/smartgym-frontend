<!DOCTYPE html>
<html>
<head>
    <title>Locker</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- 🔒 ROLE PROTECTION -->
<script>
const user = JSON.parse(localStorage.getItem("user"));

if (!user) {
    window.location.href = "index.html";
}

</script>

<!-- NAVBAR -->
<div class="navbar">
    <h2>GYM SYSTEM</h2>
    <div class="menu" id="menu"></div>
</div>

<!-- MAIN -->
<div class="layout">
<div class="main">

<div class="section">
    <h2>Locker</h2>

    <!-- TABS -->
    <div style="margin-bottom:15px;">
        <button onclick="showTab('current')">Current</button>
        <button onclick="showTab('history')">History</button>
        <button onclick="showTab('approval')">Approval</button>
    </div>

    <!-- ================= CURRENT ================= -->
    <div id="current-view">
        <table>
            <thead>
                <tr>
                    <th>Locker No.</th>
                    <th>User</th>
                    <th>Time Start</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="locker-body"></tbody>
        </table>
    </div>

    <!-- ================= HISTORY ================= -->
    <div id="history-view" style="display:none;">

        <div style="margin-bottom:10px;">
            <input type="date" id="dateFilter">
            <button onclick="loadHistory()">Filter</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Locker</th>
                    <th>User</th>
                    <th>Time Start</th>
                    <th>Time End</th>
                </tr>
            </thead>
            <tbody id="history-body"></tbody>
        </table>

    </div>

    <!-- ================= APPROVAL ================= -->
    <div id="approval-view" style="display:none;">

        <h3>Locker Booking Requests</h3>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>User</th>
                    <th>Locker</th>
                    <th>Date</th>
                    <th>Time</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody id="approval-body"></tbody>
        </table>

    </div>

</div>

</div>
</div>

<!-- SOCKET -->
<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

<script>
const API_URL = "https://smartgym-api-ia2e.onrender.com";

// ================= MENU =================
const menu = document.getElementById("menu");

if(user.role === "admin"){
    menu.innerHTML = `
        <a href="admin.html">Home</a>
        <a href="messages.html">Messages</a>
        <a href="attendance.html">Attendance</a>
        <a href="locker.html">Locker</a>
        <a href="members.html">Members</a>
        <a href="staff_manage.html">Staff</a>
        <a href="create_account.html">Create Account</a>
    `;
}else{
    menu.innerHTML = `
        <a href="staff.html">Home</a>
        <a href="messages.html">Messages</a>
        <a href="attendance.html">Attendance</a>
        <a href="locker.html">Locker</a>
    `;
}

// ================= SOCKET =================
const socket = io(API_URL, {
    transports: ["websocket"],
    reconnection: true
});

socket.on("locker_update", () => {
    loadLockers();
});

// ================= TAB SWITCH =================
function showTab(tab){

    document.getElementById("current-view").style.display = "none";
    document.getElementById("history-view").style.display = "none";
    document.getElementById("approval-view").style.display = "none";

    if(tab === "current"){
        document.getElementById("current-view").style.display = "block";
        loadLockers();
    }

    if(tab === "history"){
        document.getElementById("history-view").style.display = "block";
        loadHistory();
    }

    if(tab === "approval"){
        document.getElementById("approval-view").style.display = "block";
        loadApproval();
    }
}

// ================= CURRENT =================
async function loadLockers(){
    try{
        const res = await fetch(`${API_URL}/api/lockers`);
        const result = await res.json();
        const data = result.data;

        const table = document.getElementById("locker-body");
        table.innerHTML = "";

        const today = new Date().toISOString().split("T")[0];

        const lockers = {
            1: { name: "-", status: "AVAILABLE", time_start: "-" },
            2: { name: "-", status: "AVAILABLE", time_start: "-" },
            3: { name: "-", status: "AVAILABLE", time_start: "-" }
        };

        data.forEach(lock => {
            if(!lock.time_start) return;

            const date = lock.time_start.split(" ")[0];

            if(date === today && lock.status === "ACTIVE"){
                lockers[lock.locker] = {
                    name: lock.name,
                    status: lock.status,
                    time_start: lock.time_start
                };
            }
        });

        for(let i=1; i<=3; i++){
            const l = lockers[i];

            table.innerHTML += `
                <tr>
                    <td>Locker ${i}</td>
                    <td>${l.name}</td>
                    <td>${formatTime(l.time_start)}</td>
                    <td class="${getColor(l.status)}">${l.status}</td>
                </tr>
            `;
        }

    }catch(err){
        console.error(err);
    }
}

// ================= HISTORY =================
async function loadHistory(){
    try{
        const date = document.getElementById("dateFilter").value;

        let url = `${API_URL}/api/locker_history`;
        if(date) url += `?date=${date}`;

        const res = await fetch(url);
        const result = await res.json();
        const data = result.data;

        const table = document.getElementById("history-body");
        table.innerHTML = "";

        if(!data || data.length === 0){
            table.innerHTML = `<tr><td colspan="4">No records</td></tr>`;
            return;
        }

        data.forEach(row => {
            table.innerHTML += `
                <tr>
                    <td>Locker ${row.locker}</td>
                    <td>${row.name}</td>
                    <td>${formatTime(row.start)}</td>
                    <td>${formatTime(row.end)}</td>
                </tr>
            `;
        });

    }catch(err){
        console.error(err);
    }
}

// ================= APPROVAL =================
async function loadApproval(){

    try{

        const res = await fetch(`${API_URL}/api/bookings`);

        const result = await res.json();

        console.log("BOOKINGS:", result);

        const data = result.data || [];

        const table =
            document.getElementById("approval-body");

        table.innerHTML = "";

        // =========================
        // NO BOOKINGS
        // =========================
        if(data.length === 0){

            table.innerHTML = `
                <tr>
                    <td colspan="7">
                        No bookings
                    </td>
                </tr>
            `;

            return;
        }

        // =========================
        // LOOP BOOKINGS
        // =========================
        data.forEach(b => {

            let actions = "";

            // =====================
            // PENDING
            // =====================
            if(b.status === "PENDING"){

                actions = `
                    <button onclick="approve(${b.id})">
                        Approve
                    </button>

                    <button onclick="decline(${b.id})">
                        Decline
                    </button>
                `;
            }

            // =====================
            // APPROVED/DECLINED
            // =====================
            else{

                actions = b.status;
            }

            // =====================
            // SLOT FIX
            // =====================
            let slot = "-";

            if(b.slot){

                slot = b.slot;
            }

            // =====================
            // ROW
            // =====================
            table.innerHTML += `

                <tr>

                    <td>${b.id}</td>

                    <td>${b.user_id}</td>

                    <td>
                        Locker ${b.locker_number}
                    </td>

                    <td>${b.date}</td>

                    <td>${slot}</td>

                    <td>${b.status}</td>

                    <td>${actions}</td>

                </tr>
            `;
        });

    }catch(err){

        console.error("LOAD APPROVAL ERROR:", err);
    }
}
// ================= ACTION =================
async function approve(id){
    await fetch(`${API_URL}/api/update_booking`, {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ id:id, status:"APPROVED" })
    });

    loadApproval();
}

async function decline(id){
    const reason = prompt("Reason:");

    await fetch(`${API_URL}/api/update_booking`, {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
            id:id,
            status:"DECLINED",
            reason:reason
        })
    });

    loadApproval();
}

// ================= HELPERS =================
function getColor(status){
    if(status === "ACTIVE") return "blue";
    if(status === "OVERTIME") return "red";
    return "green";
}

function formatTime(dt){
    if(!dt || dt === "-") return "-";

    return new Date(dt).toLocaleString([], {
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit'
    });
}

// ================= INIT =================
window.onload = () => {
    showTab("current");

    const today = new Date().toISOString().split("T")[0];
    document.getElementById("dateFilter").value = today;
};

// fallback refresh
setInterval(loadLockers, 10000);
</script>

</body>
</html>

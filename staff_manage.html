<!DOCTYPE html>
<html>
<head>
    <title>Staff Management</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<!-- 🔒 ADMIN ONLY -->
<script>
const user = JSON.parse(localStorage.getItem("user"));

if (!user) {
    window.location.href = "index.html";
}
</script>

<!-- NAVBAR -->
<div class="navbar">
    <h2>SMART GYM</h2>
    <div class="menu" id="menu"></div>
</div>

<div class="layout">
<div class="main">

<h2>Staff Management</h2>

<div style="margin-bottom:15px;">
    <input type="text" id="name" placeholder="Enter name">
    <input type="text" id="roleInput" placeholder="Enter role">
    <button onclick="addStaff()">Add Staff</button>
</div>

<table>
<thead>
<tr>
<th>Name</th>
<th>Role</th>
<th>Action</th>
</tr>
</thead>
<tbody id="staff-body"></tbody>
</table>

</div>
</div>

<script>
// 🔥 MENU
const menu = document.getElementById("menu");
menu.innerHTML = `
    <a href="admin.html">
        <i class="fa-solid fa-house"></i>
        Home
    </a>

    <a href="messages.html">
        <i class="fa-regular fa-comment"></i>
        Messages
    </a>

    <a href="attendance.html">
        <i class="fa-regular fa-calendar-check"></i>
        Attendance
    </a>

    <a href="locker.html">
        <i class="fa-solid fa-lock"></i>
        Locker
    </a>

    <a href="members.html">
        <i class="fa-solid fa-users"></i>
        Members
    </a>

    <a href="staff_manage.html">
        <i class="fa-regular fa-user"></i>
        Staff
    </a>

    <a href="create_account.html">
        <i class="fa-solid fa-user-plus"></i>
        Create Account
    </a>
`;

// ===== LOAD =====
function loadStaff(){
    let staff = JSON.parse(localStorage.getItem("staff")) || [];
    const table = document.getElementById("staff-body");
    table.innerHTML = "";

    if(staff.length === 0){
        table.innerHTML = `<tr><td colspan="3">No staff</td></tr>`;
        return;
    }

    staff.forEach((s, i) => {
        table.innerHTML += `
        <tr>
            <td>${s.name}</td>
            <td>${s.role}</td>
            <td><button onclick="removeStaff(${i})">Remove</button></td>
        </tr>`;
    });
}

// ===== ADD =====
function addStaff(){
    const name = document.getElementById("name").value.trim();
    const role = document.getElementById("roleInput").value.trim();

    if(!name || !role){
        alert("Fill all fields");
        return;
    }

    let staff = JSON.parse(localStorage.getItem("staff")) || [];

    staff.push({name, role});

    localStorage.setItem("staff", JSON.stringify(staff));

    // 🔥 clear input
    document.getElementById("name").value = "";
    document.getElementById("roleInput").value = "";

    loadStaff();
}

// ===== REMOVE =====
function removeStaff(i){
    let staff = JSON.parse(localStorage.getItem("staff")) || [];
    staff.splice(i,1);
    localStorage.setItem("staff", JSON.stringify(staff));
    loadStaff();
}

loadStaff();
</script>

</body>
</html>

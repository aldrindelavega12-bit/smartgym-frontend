<!DOCTYPE html>
<html>
<head>
    <title>Staff Management</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<!-- 🔒 ADMIN ONLY -->
<script>
const user = JSON.parse(localStorage.getItem("user"));

if (!user) {
    window.location.href = "index.html";
}
</script>

<!-- NAVBAR -->
<div class="navbar">
    <h2>SMART GYM</h2>
    <div class="menu" id="menu"></div>
</div>

<div class="layout">
<div class="main">

<h2>Staff Management</h2>

<div style="margin-bottom:15px;">
    <input type="text" id="fullname" placeholder="Full Name">

    <select id="role">
        <option value="staff">Desk Staff</option>
        <option value="trainer">Trainer</option>
    </select>

    <input type="text" id="username" placeholder="Username">

    <input type="password" id="password" placeholder="Password">

    <button onclick="createAccount()">
        Create Account
    </button>
</div>

<table>
<thead>
<tr>
<th>Name</th>
<th>Role</th>
<th>Action</th>
</tr>
</thead>
<tbody id="staff-body"></tbody>
</table>

</div>
</div>
<div id="notifPopup" class="notif-popup">
    <b id="notifTitle">New Message</b>
    <p id="notifText">You have a new message</p>
</div>

<audio id="notifSound">
    <source src="notif.mp3" type="audio/mpeg">
</audio>

<script>
const API_URL =
"https://smartgym-api-ia2e.onrender.com";
// 🔥 MENU
const menu = document.getElementById("menu");
menu.innerHTML = `
    <a href="admin.html">
        <i class="fa-solid fa-house"></i>
        Home
    </a>

    <a href="messages.html" class="msg-link">

        <i class="fa-regular fa-comment"></i>

        Messages

        <span
            id="msg-count"
            class="msg-count">
            0
        </span>

    </a>

    <a href="attendance.html">
        <i class="fa-regular fa-calendar-check"></i>
        Attendance
    </a>

    <a href="locker.html">
        <i class="fa-solid fa-lock"></i>
        Locker
    </a>

    <a href="members.html">
        <i class="fa-solid fa-users"></i>
        Members
    </a>

    <a href="staff_manage.html">
        <i class="fa-regular fa-user"></i>
        Staff
    </a>

    <a href="create_account.html">
        <i class="fa-solid fa-user-plus"></i>
        Create Account
    </a>
`;

// ===== LOAD =====
function loadStaff(){
    let staff = JSON.parse(localStorage.getItem("staff")) || [];
    const table = document.getElementById("staff-body");
    table.innerHTML = "";

    if(staff.length === 0){
        table.innerHTML = `<tr><td colspan="3">No staff</td></tr>`;
        return;
    }

    staff.forEach((s, i) => {
        table.innerHTML += `
        <tr>
            <td>${s.name}</td>
            <td>${s.role}</td>
            <td><button onclick="removeStaff(${i})">Remove</button></td>
        </tr>`;
    });
}
async function loadMessageCount(){

    const res = await fetch(
        `${API_URL}/api/admin_messages`
    );

    const data = await res.json();

    const unread =
        data.filter(
            m => m.is_read == 0
        ).length;
    if(
        lastUnread !== 0 &&
        unread > lastUnread
    ){

        document
            .getElementById(
                "notifSound"
            )
            ?.play();

        showNotifPopup(
            "New Message",
            `${unread - lastUnread} new notification`
        );
    }

    lastUnread = unread;

    const badge =
        document.getElementById(
            "msg-count"
        );

    if(!badge) return;

    badge.innerText =
        unread > 99
        ? "99+"
        : unread;

    badge.style.display =
        unread > 0
        ? "flex"
        : "none";
}
// ===== ADD =====
function addStaff(){
    const name = document.getElementById("name").value.trim();
    const role = document.getElementById("roleInput").value.trim();

    if(!name || !role){
        alert("Fill all fields");
        return;
    }

    let staff = JSON.parse(localStorage.getItem("staff")) || [];

    staff.push({name, role});

    localStorage.setItem("staff", JSON.stringify(staff));

    document.getElementById("name").value = "";
    document.getElementById("roleInput").value = "";

    loadStaff();
}
async function createAccount(){

    const fullname =
        document.getElementById(
            "fullname"
        ).value.trim();

    const role =
        document.getElementById(
            "role"
        ).value;

    const username =
        document.getElementById(
            "username"
        ).value.trim();

    const password =
        document.getElementById(
            "password"
        ).value.trim();

    if(
        !fullname ||
        !username ||
        !password
    ){
        alert(
            "Complete all fields"
        );
        return;
    }

    try{

        const res = await fetch(
            `${API_URL}/api/create_staff_account`,
            {
                method:"POST",
                headers:{
                    "Content-Type":"application/json"
                },
                body:JSON.stringify({
                    fullname,
                    role,
                    username,
                    password
                })
            }
        );

        const data =
            await res.json();

        alert(
            data.message ||
            data.status
        );

        document.getElementById(
            "fullname"
        ).value = "";

        document.getElementById(
            "username"
        ).value = "";

        document.getElementById(
            "password"
        ).value = "";

    }catch(err){

        console.log(err);

        alert(
            "Server Error"
        );
    }
}
let lastUnread = 0;

function showNotifPopup(title,text){

    const popup =
        document.getElementById(
            "notifPopup"
        );

    document.getElementById(
        "notifTitle"
    ).innerText = title;

    document.getElementById(
        "notifText"
    ).innerText = text;

    popup.classList.add("show");

    setTimeout(() => {

        popup.classList.remove(
            "show"
        );

    },4000);
}
// ===== REMOVE =====
function removeStaff(i){
    let staff = JSON.parse(localStorage.getItem("staff")) || [];
    staff.splice(i,1);
    localStorage.setItem("staff", JSON.stringify(staff));
    loadStaff();
}
function showNotifPopup(title,text){

    const popup =
        document.getElementById(
            "notifPopup"
        );

    if(!popup) return;

    document.getElementById(
        "notifTitle"
    ).innerText = title;

    document.getElementById(
        "notifText"
    ).innerText = text;

    popup.classList.add("show");

    setTimeout(() => {

        popup.classList.remove(
            "show"
        );

    },4000);
}

loadStaff();
loadMessageCount();
socket.on("new_message", () => {

    loadMessages();
    loadMessageCount();
});

socket.on("priority_alert", () => {

    loadMessages();
    loadMessageCount();
});
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Smart Gym</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/background.css">
</head>
<body>

<div class="bg-overlay">

    <div class="container">

        <!-- LEFT TEXT -->
        <div class="left">
            <h1>BE STRONG,<br>BE FIT</h1>
            <p>Train for your future self.</p>
        </div>

        <!-- LOGIN CARD -->
        <div class="login-card">
            <h2>SMART GYM</h2>

            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">

            <button onclick="login()">Log in</button>

            <p id="error"></p>

            <div class="links">
                <span onclick="openModal('faq')">FAQ</span> |
                <span onclick="openModal('about')">About Us</span> |
                <span onclick="openModal('contact')">Contact</span> |
                <span onclick="openModal('terms')">Terms</span>
            </div>
        </div>

    </div>

</div>

<!-- 🔥 MODAL -->
<div id="modal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">×</span>
        <h2 id="modal-title"></h2>
        <p id="modal-body"></p>
    </div>
</div>

<script src="js/app.js"></script>

<!-- SCRIPT -->
<script>

function openModal(type){
    const modal = document.getElementById("modal");
    const title = document.getElementById("modal-title");
    const body = document.getElementById("modal-body");

    modal.style.display = "flex";

    if(type === "faq"){
        title.innerText = "FAQ";
        body.innerText = "Q: How to use the gym?\nA: Log in and start your workout.\n\nQ: How to book locker?\nA: Go to locker section and book.";
    }

    if(type === "about"){
        title.innerText = "About Us";
        body.innerText = "Smart Gym System is a modern fitness management platform using facial and fingerprint recognition.";
    }

    if(type === "contact"){
        title.innerText = "Contact Us";
        body.innerText = "Phone: 09123456789\nEmail: smartgym@email.com";
    }

    if(type === "terms"){
        title.innerText = "Terms & Conditions";
        body.innerText = "By using this system, you agree to follow gym rules and policies.";
    }
}

function closeModal(){
    document.getElementById("modal").style.display = "none";
}

// close outside
window.onclick = function(e){
    if(e.target.id === "modal"){
        closeModal();
    }
}

</script>

<!-- STYLE -->
<style>

.links{
    margin-top: 15px;
    font-size: 12px;
    color: #555;
}

.links span{
    cursor: pointer;
}

.links span:hover{
    text-decoration: underline;
}

/* MODAL */
.modal{
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    justify-content: center;
    align-items: center;
}

.modal-content{
    background: white;
    padding: 20px;
    border-radius: 10px;
    width: 400px;
}

.close{
    float: right;
    cursor: pointer;
    font-size: 20px;
}

</style>

</body>
</html>

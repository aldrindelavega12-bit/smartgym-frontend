<!DOCTYPE html>
<html>
<head>
    <title>Smart Gym</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/background.css">
</head>
<body class="bg-gym">

<div class="bg-overlay">

    <div class="container">

        <!-- LEFT TEXT -->
        <div class="left">
            <h1>BE STRONG,<br>BE FIT</h1>
            <p>Train for your future self.</p>
        </div>

        <!-- LOGIN CARD -->
        <div class="login-card">
            <h2>SMART GYM</h2>

            <input type="text" id="username" placeholder="Username">
            <div class="password-wrapper">
                <input type="password" id="password" placeholder="Password">
                <span class="toggle-password" onclick="togglePassword()">👁</span>
            </div>
            <button id="loginBtn" onclick="login()">
                Log in
            </button>

            <button
                class="change-password-main-btn"
                onclick="openChangePassword()"
            >
                Change Password
            </button>

            <p id="error" class="error-message"></p>

            <div class="links">
                <span onclick="openModal('faq')">FAQ</span> |
                <span onclick="openModal('about')">About Us</span> |
                <span onclick="openModal('contact')">Contact</span> |
                <span onclick="openModal('terms')">Terms</span>
            </div>
        </div>

    </div>

</div>

<!-- 🔥 MODAL -->
<div id="modal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">×</span>
        <h2 id="modal-title"></h2>
        <p id="modal-body"></p>
    </div>
</div>

<div id="changeModal" class="modal">

    <div class="change-password-card">

        <span class="close-btn"
        onclick="closeChangePassword()">×</span>

        <h2 class="change-title">
            Change Password
        </h2>

        <input
            type="text"
            id="cp_user"
            placeholder="Username"
            class="change-input"
        >

        <input
            type="password"
            id="old_password"
            placeholder="Old Password"
            class="change-input"
        >

        <input
            type="password"
            id="new_password"
            placeholder="New Password"
            class="change-input"
        >

        <button
            class="change-btn"
            onclick="changePassword()"
        >
            Update Password
        </button>

    </div>

</div>
<script src="js/app.js"></script>

<!-- SCRIPT -->
<script>

function openModal(type){
    const modal = document.getElementById("modal");
    const title = document.getElementById("modal-title");
    const body = document.getElementById("modal-body");

    modal.style.display = "flex";

    if(type === "faq"){
        title.innerText = "FAQ";
        body.innerText = "Q: How to use the gym?\nA: Log in and start your workout.\n\nQ: How to book locker?\nA: Go to locker section and book.";
    }

    if(type === "about"){
        title.innerText = "About Us";
        body.innerText = "Smart Gym System is a modern fitness management platform using facial and fingerprint recognition.";
    }

    if(type === "contact"){
        title.innerText = "Contact Us";
        body.innerText = "Phone: 09123456789\nEmail: smartgym@email.com";
    }

    if(type === "terms"){
        title.innerText = "Terms & Conditions";
        body.innerText = "By using this system, you agree to follow gym rules and policies.";
    }
}

function closeModal(){
    document.getElementById("modal").style.display = "none";
}
function togglePassword() {
    const input = document.getElementById("password");

    if (input.type === "password") {
        input.type = "text";
    } else {
        input.type = "password";
    }
}
function openChangePassword(){

    document.getElementById(
        "changeModal"
    ).style.display = "flex";
}

function closeChangePassword(){

    document.getElementById(
        "changeModal"
    ).style.display = "none";
}

async function changePassword(){

    const username =
        document.getElementById("cp_user").value.trim();

    const old_password =
        document.getElementById("old_password").value.trim();

    const new_password =
        document.getElementById("new_password").value.trim();

    if(!username || !old_password || !new_password){

        alert("Fill all fields");
        return;
    }

    try{

        const response = await fetch(
            "https://smartgym-api-ia2e.onrender.com/api/change_password",
            {
                method:"POST",

                headers:{
                    "Content-Type":"application/json"
                },

                body:JSON.stringify({
                    username,
                    old_password,
                    new_password
                })
            }
        );

        const data = await response.json();

        alert(data.message);

        if(data.status === "success"){

            closeChangePassword();

            document.getElementById("cp_user").value = "";
            document.getElementById("old_password").value = "";
            document.getElementById("new_password").value = "";
        }

    }catch(err){

        console.log(err);

        alert("Server error");
    }
}

window.onclick = function(e){

    if(e.target.id === "modal"){
        closeModal();
    }

    if(e.target.id === "changeModal"){
        closeChangePassword();
    }
}

</script>

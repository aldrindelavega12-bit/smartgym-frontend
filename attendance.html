<!DOCTYPE html>
<html>
<head>
    <title>Attendance</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<!-- 🔒 ROLE PROTECTION -->
<script>
const user = JSON.parse(localStorage.getItem("user"));

if (!user) {
    window.location.href = "index.html";
}
</script>

<!-- NAVBAR -->
<div class="navbar">
    <h2>SMART GYM</h2>
    <div class="menu" id="menu"></div>
</div>

<!-- MAIN -->
<div class="layout">
<div class="main">

<div class="section">
    <h2>Attendance Log</h2>

    <!-- DATE FILTER -->
    <div style="margin-bottom:15px;">
        <input type="date" id="dateFilter">
        <button onclick="loadAttendance()">Filter</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Type</th>
                <th>Time In</th>
                <th>Time Out</th>
                <th>Locker</th>
                <th>Remarks</th>
            </tr>
        </thead>

        <tbody id="attendance-body"></tbody>
    </table>
</div>

</div>
</div>

<!-- SOCKET -->
<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

<script>
const API_URL = "https://smartgym-api-ia2e.onrender.com";

// ================= MENU =================
const menu = document.getElementById("menu");

if(user.role === "admin"){
    menu.innerHTML = `
    <a href="admin.html">
        <i class="fa-solid fa-house"></i>
        Home
    </a>

    <a href="messages.html">
        <i class="fa-regular fa-comment"></i>
        Messages
    </a>

    <a href="attendance.html">
        <i class="fa-regular fa-calendar-check"></i>
        Attendance
    </a>

    <a href="locker.html">
        <i class="fa-solid fa-lock"></i>
        Locker
    </a>

    <a href="members.html">
        <i class="fa-solid fa-users"></i>
        Members
    </a>

    <a href="staff_manage.html">
        <i class="fa-regular fa-user"></i>
        Staff
    </a>

    <a href="create_account.html">
        <i class="fa-solid fa-user-plus"></i>
        Create Account
    </a>
`;
}else{
    menu.innerHTML = `
        <a href="staff.html">Home</a>
        <a href="messages.html">Messages</a>
        <a href="attendance.html">Attendance</a>
        <a href="locker.html">Locker</a>
    `;
}

// ================= SOCKET =================
const socket = io(API_URL, {
    transports: ["websocket"],
    reconnection: true
});

socket.on("connect", () => {
    console.log("CONNECTED 🔥");
});

socket.on("attendance_update", () => {
    console.log("REALTIME UPDATE 🔥");
    loadAttendance();
});

// ================= LOAD =================
async function loadAttendance(){
    try{
        const date = document.getElementById("dateFilter").value;

        let url = `${API_URL}/api/attendance`;
        if(date){
            url += `?date=${date}`;
        }

        const res = await fetch(url);
        const result = await res.json();
        const data = result.data;

        const table = document.getElementById("attendance-body");
        table.innerHTML = "";

        if(!data || data.length === 0){
            table.innerHTML = `
                <tr>
                    <td colspan="6">No records found</td>
                </tr>
            `;
            return;
        }

        data.forEach(row => {
            const tr = document.createElement("tr");

            tr.innerHTML = `
                <td>${row.name}</td>
                <td>${row.type}</td>
                <td>${row.time_in}</td>
                <td>${row.time_out}</td>
                <td>${row.locker}</td>
                <td class="${getColor(row.remarks)}">${row.remarks}</td>
            `;

            table.appendChild(tr);
        });

    }catch(err){
        console.error("Attendance error:", err);
    }
}

// ================= HELPERS =================
function getColor(status){
    if(status === "Active") return "blue";
    if(status === "Completed") return "green";
    if(status === "Overtime") return "red";
    return "";
}

function formatTime(dt){
    if(!dt || dt === "-") return "-";

    try{
        const d = new Date(dt);
        return d.toLocaleString([], {
            year: 'numeric',
            month: '2-digit',
            day: '2-digit',
            hour: '2-digit',
            minute: '2-digit'
        });
    }catch{
        return dt;
    }
}

// ================= INIT =================
window.onload = () => {
    const today = new Date().toISOString().split("T")[0];
    document.getElementById("dateFilter").value = today;
    loadAttendance();
};

// 🔁 fallback refresh
setInterval(loadAttendance, 10000);
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Messages</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<script>
const user = JSON.parse(localStorage.getItem("user"));
if (!user) {
    window.location.href = "index.html";
}
</script>

<div class="navbar">
    <h2>SMART GYM</h2>
    <div class="menu" id="menu"></div>
</div>

<div class="layout">
    <div class="main">

        <div class="hero">
            <h1>SYSTEM MESSAGES</h1>
            <p>Notifications and alerts</p>
        </div>

        <div class="section">

            <ul id="messages-list"></ul>

            <br>

            <button onclick="clearMessages()">
                Clear All
            </button>

        </div>

    </div>
</div>
<div id="messageModal" class="modal">

    <div class="modal-content">

        <button
            class="close-btn"
            onclick="closeMessage()">
            ×
        </button>

        <h2 id="modalTitle"></h2>

        <p id="modalMessage"></p>

        <small id="modalDate"></small>

    </div>

</div>

<div id="notifPopup" class="notif-popup" onclick="goMessages()">
    <b id="notifTitle">New Message</b>
    <p id="notifText">You have a new message</p>
</div>


<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

<script>
const API_URL = "https://smartgym-api-ia2e.onrender.com";

// ================= MENU =================
const menu = document.getElementById("menu");

if(user.role === "admin"){
   menu.innerHTML = `
    <a href="admin.html">
        <i class="fa-solid fa-house"></i>
        Home
    </a>

    <a href="messages.html" class="msg-link">
        <i class="fa-solid fa-envelope"></i>
        Messages
        <span id="msg-count" class="msg-count">0</span>
    </a>

    <a href="attendance.html">
        <i class="fa-regular fa-calendar-check"></i>
        Attendance
    </a>

    <a href="locker.html">
        <i class="fa-solid fa-lock"></i>
        Locker
    </a>

    <a href="members.html">
        <i class="fa-solid fa-users"></i>
        Members
    </a>

    <a href="staff_manage.html">
        <i class="fa-regular fa-user"></i>
        Staff
    </a>

    <a href="create_account.html">
        <i class="fa-solid fa-user-plus"></i>
        Create Account
    </a>
`;
}else{
    menu.innerHTML = `
         <a href="staff.html">
            <i class="fa-solid fa-house"></i>
            Home
        </a>

        <a href="messages.html">
            <i class="fa-regular fa-comment"></i>
            Messages
        </a>

        <a href="attendance.html">
            <i class="fa-regular fa-calendar-check"></i>
            Attendance
        </a>

        <a href="locker.html">
            <i class="fa-solid fa-lock"></i>
            Locker
        </a>
    `;
}

// ================= SOCKET =================
const socket = io(API_URL, { transports: ["websocket"] });

// ⚠️ IMPORTANT FIX:
// Messages page is DISPLAY ONLY
// ❌ DO NOT SAVE HERE (to avoid duplicates / conflicts)

// ================= LOAD =================


// ================= LOAD ADMIN MESSAGES =================
async function loadMessages(){

    try{

        const res = await fetch(
            `${API_URL}/api/admin_messages`
        );

        const data = await res.json();

        currentMessages = data;

        const list =
            document.getElementById(
                "messages-list"
            );

        list.innerHTML = "";

        // NO DATA
        if(data.length === 0){

            list.innerHTML = `
                <li>No alerts</li>
            `;

            return;
        }

        // LOOP
        data.forEach(msg => {

            const unreadClass =
                msg.is_read == 0
                ? "unread"
                : "";

            const badge =
                msg.is_read == 0
                ? `<span class="unread-badge">
                        NEW
                </span>`
                : "";

            list.innerHTML += `

            <li class="msg-card ${unreadClass}"
                onclick="openMessage(${msg.id})">

                <div class="msg-header">

                    <b>${msg.title}</b>

                    ${badge}

                    <div class="msg-actions">

                        <i class="fa-solid fa-ellipsis-vertical"
                        onclick="
                        event.stopPropagation();
                        toggleMenu(${msg.id})
                        ">
                        </i>

                        <div
                            id="menu-${msg.id}"
                            class="msg-menu">

                            <button onclick="
                                event.stopPropagation();
                                markRead(${msg.id})
                                ">
                                Mark Read
                            </button>

                            <button onclick="
                                event.stopPropagation();
                                markUnread(${msg.id})
                                ">
                                Mark Unread
                            </button>

                            <button onclick="
                                event.stopPropagation();
                                deleteMessage(${msg.id})
                                ">
                                Delete
                            </button>

                        </div>

                    </div>

                </div>

                <p>${msg.message}</p>

                <small>${msg.created_at}</small>

            </li>
            `;
        });

    }catch(err){

        console.log(err);
    }
}


// ================= CLEAR =================
function clearMessages(){

    alert(
        "Database messages cannot be cleared here."
    );
}


// ================= INIT =================
loadMessages();

let currentMessages = [];

function openMessage(id){

    const msg =
        currentMessages.find(
            m => m.id == id
        );

    if(!msg) return;

    document.getElementById(
        "modalTitle"
    ).innerText = msg.title;

    document.getElementById(
        "modalMessage"
    ).innerText = msg.message;

    document.getElementById(
        "modalDate"
    ).innerText = msg.created_at;

    document.getElementById(
        "messageModal"
    ).style.display = "flex";

    markRead(id);
}

function closeMessage(){

    document.getElementById(
        "messageModal"
    ).style.display = "none";
}

async function markRead(id){

    await fetch(
        `${API_URL}/api/message_read/${id}`,
        {
            method:"POST"
        }
    );

    loadMessages();
}
async function deleteMessage(id){

    if(
        !confirm(
            "Delete this message?"
        )
    ) return;

    await fetch(
        `${API_URL}/api/delete_message/${id}`,
        {
            method:"DELETE"
        }
    );

    loadMessages();
}
document.addEventListener("click", () => {

    document
        .querySelectorAll(".msg-menu")
        .forEach(menu => {

            menu.classList.remove("show");
        });
});

async function markUnread(id){

    await fetch(
        `${API_URL}/api/message_unread/${id}`,
        {
            method:"POST"
        }
    );

    loadMessages();
}



function toggleMenu(id){

    event.stopPropagation();

    document
    .querySelectorAll(".msg-card")
    .forEach(card=>{
        card.classList.remove("menu-open");
    });

    const menu =
        document.getElementById(`menu-${id}`);

    const card =
        menu.closest(".msg-card");

    if(!menu.classList.contains("show")){
        card.classList.add("menu-open");
    }

    menu.classList.toggle("show");
}

// ================= REALTIME =================
socket.on("new_booking", (data) => {

    console.log(
        "NEW BOOKING RECEIVED",
        data
    );

    loadMessages();
});
socket.on("new_message", () => {
    console.log("NEW MESSAGE RECEIVED");
    loadMessages();
});

socket.on("priority_alert", (data) => {
    console.log("PRIORITY ALERT RECEIVED", data);
    loadMessages();
});


// ================= SOCKET =================
socket.on("connect", () => {

    console.log(
        "Messages page connected"
    );
});

loadMessages();
loadMessageCount();


</script>

<style>

.msg-link{

    position:relative;

    display:flex;

    align-items:center;

    gap:8px;
}

.msg-count{

    position:absolute;

    top:-8px;

    right:-10px;

    min-width:18px;

    height:18px;

    padding:0 4px;

    border-radius:50px;

    background:#ff2b2b;

    color:white;

    font-size:11px;

    font-weight:bold;

    display:flex;

    align-items:center;

    justify-content:center;
}

.msg-card{

    position:relative;

    overflow:visible;

    list-style:none;

    background:rgba(255,255,255,.08);

    border:1px solid rgba(255,255,255,.1);

    border-radius:14px;

    padding:18px;

    margin-bottom:15px;

    color:white;

    cursor:pointer;

    transition:.3s;
}
.msg-card.unread{

    border-left:6px solid #4da3ff;

    background:
    linear-gradient(
        90deg,
        rgba(77,163,255,.18),
        rgba(255,255,255,.05)
    );

    box-shadow:
    0 0 20px
    rgba(77,163,255,.35);
}


.unread-badge{

    background:#4da3ff;

    color:white;

    padding:4px 10px;

    border-radius:20px;

    font-size:11px;

    font-weight:bold;
}

.msg-header{

    display:flex;

    align-items:center;
}

.msg-header b{

    flex:1;
}
.msg-right{

    display:flex;

    align-items:center;

    gap:15px;
}

.msg-menu{

    display:none;

    position:absolute;

    right:0;

    top:40px;

    width:180px;

    background:#121212;

    border:1px solid rgba(255,255,255,.08);

    border-radius:14px;

    overflow:hidden;

    z-index:99999;

    box-shadow:
    0 10px 25px rgba(0,0,0,.5);
}

.msg-menu.show{

    display:block;
}

.modal{

    display:none;

    position:fixed;

    inset:0;

    background:
        rgba(0,0,0,.7);

    justify-content:center;

    align-items:center;

    z-index:9999;
}

.modal-content{

    background:#111;

    width:90%;

    max-width:600px;

    border-radius:16px;

    padding:25px;

    color:white;
}

.close-btn{

    float:right;

    border:none;

    background:none;

    color:white;

    font-size:25px;

    cursor:pointer;
}
.msg-card.menu-open{
    z-index:9999;
}
.msg-actions{
    position:relative;
    z-index:10000;
}
.msg-menu button{

    width:100%;

    border:none;

    background:none;

    color:white;

    text-align:left;

    padding:14px 18px;

    cursor:pointer;

    font-size:14px;

    transition:.25s;
}

.msg-menu button:hover{

    background:
    rgba(77,163,255,.15);

    color:#4da3ff;
}
.msg-card:not(.unread){
    opacity:.9;
}
.unread-badge{

    background:#4da3ff;

    color:white;

    font-size:11px;

    font-weight:bold;

    padding:5px 12px;

    border-radius:30px;

    letter-spacing:.5px;
}
.msg-actions{

    position:relative;
}

.msg-actions i{

    cursor:pointer;

    font-size:18px;

    padding:8px;

    border-radius:50%;

    transition:.3s;
}

.msg-actions i:hover{

    background:
    rgba(77,163,255,.15);

    color:#4da3ff;
}
.modal-content{

    background:
    linear-gradient(
        135deg,
        #0b1320,
        #101828
    );

    border:1px solid
    rgba(77,163,255,.25);

    box-shadow:
    0 0 25px
    rgba(77,163,255,.25);

    width:90%;

    max-width:650px;

    border-radius:18px;

    padding:30px;

    color:white;
}
#modalTitle{

    color:#4da3ff;

    margin-bottom:15px;

    font-size:26px;
}
.close-btn{

    position:absolute;

    right:20px;

    top:15px;

    border:none;

    background:none;

    color:white;

    font-size:30px;

    cursor:pointer;
}
.msg-card{

    transition:.3s;
}

.msg-card:hover{

    transform:translateY(-2px);

    box-shadow:
    0 8px 20px
    rgba(0,0,0,.25);
}
.msg-count{

    display:none;

    position:absolute;

    top:-8px;

    right:-12px;

    min-width:18px;

    height:18px;

    border-radius:50%;

    background:#ff2b2b;

    color:white;

    font-size:11px;

    font-weight:bold;

    align-items:center;

    justify-content:center;
}
</style>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Messages</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<script>
const user = JSON.parse(localStorage.getItem("user"));
if (!user) {
    window.location.href = "index.html";
}
</script>

<div class="navbar">
    <h2>SMART GYM</h2>
    <div class="menu" id="menu"></div>
</div>

<div class="layout">
    <div class="main">

        <div class="hero">
            <h1>SYSTEM MESSAGES</h1>
            <p>Notifications and alerts</p>
        </div>

        <div class="section">

            <ul id="messages-list"></ul>

            <br>

            <button onclick="clearMessages()">
                Clear All
            </button>

        </div>

    </div>
</div>

<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

<script>
const API_URL = "https://smartgym-api-ia2e.onrender.com";

// ================= MENU =================
const menu = document.getElementById("menu");

if(user.role === "admin"){
   menu.innerHTML = `
    <a href="admin.html">
        <i class="fa-solid fa-house"></i>
        Home
    </a>

    <a href="messages.html">
        <i class="fa-regular fa-comment"></i>
        Messages
    </a>

    <a href="attendance.html">
        <i class="fa-regular fa-calendar-check"></i>
        Attendance
    </a>

    <a href="locker.html">
        <i class="fa-solid fa-lock"></i>
        Locker
    </a>

    <a href="members.html">
        <i class="fa-solid fa-users"></i>
        Members
    </a>

    <a href="staff_manage.html">
        <i class="fa-regular fa-user"></i>
        Staff
    </a>

    <a href="create_account.html">
        <i class="fa-solid fa-user-plus"></i>
        Create Account
    </a>
`;
}else{
    menu.innerHTML = `
         <a href="staff.html">
            <i class="fa-solid fa-house"></i>
            Home
        </a>

        <a href="messages.html">
            <i class="fa-regular fa-comment"></i>
            Messages
        </a>

        <a href="attendance.html">
            <i class="fa-regular fa-calendar-check"></i>
            Attendance
        </a>

        <a href="locker.html">
            <i class="fa-solid fa-lock"></i>
            Locker
        </a>
    `;
}

// ================= SOCKET =================
const socket = io(API_URL, { transports: ["websocket"] });

// ⚠️ IMPORTANT FIX:
// Messages page is DISPLAY ONLY
// ❌ DO NOT SAVE HERE (to avoid duplicates / conflicts)

// ================= LOAD =================


// ================= LOAD ADMIN MESSAGES =================
async function loadMessages(){

    try{

        const res = await fetch(
            `${API_URL}/api/admin_messages`
        );

        const data = await res.json();

        const list =
            document.getElementById(
                "messages-list"
            );

        list.innerHTML = "";

        // NO DATA
        if(data.length === 0){

            list.innerHTML = `
                <li>No alerts</li>
            `;

            return;
        }

        // LOOP
        data.forEach(msg => {

            list.innerHTML += `

                <li class="msg-card">

                    <b>
                        ${msg.title}
                    </b>

                    <br><br>

                    ${msg.message}

                    <br><br>

                    <small>
                        ${msg.created_at}
                    </small>

                </li>

            `;
        });

    }catch(err){

        console.log(err);
    }
}


// ================= CLEAR =================
function clearMessages(){

    alert(
        "Database messages cannot be cleared here."
    );
}


// ================= INIT =================
loadMessages();

// ================= REALTIME =================
socket.on("new_booking", (data) => {

    console.log(
        "NEW BOOKING RECEIVED",
        data
    );

    loadMessages();
});


// ================= SOCKET =================
socket.on("connect", () => {

    console.log(
        "Messages page connected"
    );
});

</script>

<style>

.msg-card{

    list-style: none;

    background: rgba(255,255,255,0.08);

    border: 1px solid rgba(255,255,255,0.1);

    backdrop-filter: blur(10px);

    padding: 15px;

    border-radius: 12px;

    margin-bottom: 15px;

    color: white;
}

.msg-card small{

    color: #cfcfcf;
}

</style>

</body>
</html>

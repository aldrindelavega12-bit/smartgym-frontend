<!DOCTYPE html>
<html>
<head>
    <title>Messages</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<script>
const user = JSON.parse(localStorage.getItem("user"));
if (!user) {
    window.location.href = "index.html";
}
</script>

<div class="navbar">
    <h2>SMART GYM</h2>
    <div class="menu" id="menu"></div>
</div>

<div class="layout">
    <div class="main">

        <div class="hero">
            <h1>SYSTEM MESSAGES</h1>
            <p>Notifications and alerts</p>
        </div>

        <div class="section">

            <ul id="messages-list"></ul>

            <br>

            <button onclick="clearMessages()">
                Clear All
            </button>

        </div>

    </div>
</div>

<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

<script>
const API_URL = "https://smartgym-api-ia2e.onrender.com";

// ================= MENU =================
const menu = document.getElementById("menu");

if(user.role === "admin"){
   menu.innerHTML = `
    <a href="admin.html">
        <i class="fa-solid fa-house"></i>
        Home
    </a>

    <a href="messages.html">
        <i class="fa-regular fa-comment"></i>
        Messages
    </a>

    <a href="attendance.html">
        <i class="fa-regular fa-calendar-check"></i>
        Attendance
    </a>

    <a href="locker.html">
        <i class="fa-solid fa-lock"></i>
        Locker
    </a>

    <a href="members.html">
        <i class="fa-solid fa-users"></i>
        Members
    </a>

    <a href="staff_manage.html">
        <i class="fa-regular fa-user"></i>
        Staff
    </a>

    <a href="create_account.html">
        <i class="fa-solid fa-user-plus"></i>
        Create Account
    </a>
`;
}else{
    menu.innerHTML = `
        <a href="staff.html">Home</a>
        <a href="messages.html">Messages</a>
        <a href="attendance.html">Attendance</a>
        <a href="locker.html">Locker</a>
    `;
}

// ================= SOCKET =================
const socket = io(API_URL, { transports: ["websocket"] });

// ⚠️ IMPORTANT FIX:
// Messages page is DISPLAY ONLY
// ❌ DO NOT SAVE HERE (to avoid duplicates / conflicts)

// ================= LOAD =================
function loadMessages(){
    const list = document.getElementById("messages-list");
    list.innerHTML = "";

    let messages = JSON.parse(localStorage.getItem("messages")) || [];

    if(messages.length === 0){
        list.innerHTML = "<li>No alerts</li>";
        return;
    }

    messages.forEach(msg => {

        let color = "black";

        if(msg.type === "PRIORITY") color = "orange";
        if(msg.type === "OVERTIME") color = "red";
        if(msg.type === "SECURITY") color = "purple";

        list.innerHTML += `
            <li style="margin-bottom:10px; border-left:5px solid ${color}; padding-left:10px;">
                <b>${msg.text}</b><br>
                <small>${msg.time}</small>
            </li>
        `;
    });
}

// ================= CLEAR =================
function clearMessages(){
    localStorage.removeItem("messages");
    loadMessages();
}

// ================= AUTO REFRESH =================
setInterval(loadMessages, 1000);

// ================= INIT =================
loadMessages();

// ================= DEBUG (OPTIONAL) =================
socket.on("connect", () => {
    console.log("Messages page connected (display only)");
});
</script>

</body>
</html>

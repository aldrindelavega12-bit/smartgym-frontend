<!DOCTYPE html>
<html>
<head>
    <title>Messages</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<script>
const user = JSON.parse(localStorage.getItem("user"));
if (!user) {
    window.location.href = "index.html";
}
</script>

<div class="navbar">
    <h2>SMART GYM</h2>
    <div class="menu" id="menu"></div>
</div>

<div class="layout">
    <div class="main">

        <div class="hero">
            <h1>SYSTEM MESSAGES</h1>
            <p>Notifications and alerts</p>
        </div>

        <div class="section">

            <ul id="messages-list"></ul>

            <br>

            <button onclick="clearMessages()">
                Clear All
            </button>

        </div>

    </div>
</div>
<div id="messageModal" class="modal">

    <div class="modal-content">

        <button
            class="close-btn"
            onclick="closeMessage()">
            ×
        </button>

        <h2 id="modalTitle"></h2>

        <p id="modalMessage"></p>

        <small id="modalDate"></small>

    </div>

</div>

<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

<script>
const API_URL = "https://smartgym-api-ia2e.onrender.com";

// ================= MENU =================
const menu = document.getElementById("menu");

if(user.role === "admin"){
   menu.innerHTML = `
    <a href="admin.html">
        <i class="fa-solid fa-house"></i>
        Home
    </a>

    <a href="messages.html">
        <i class="fa-regular fa-comment"></i>
        Messages
    </a>

    <a href="attendance.html">
        <i class="fa-regular fa-calendar-check"></i>
        Attendance
    </a>

    <a href="locker.html">
        <i class="fa-solid fa-lock"></i>
        Locker
    </a>

    <a href="members.html">
        <i class="fa-solid fa-users"></i>
        Members
    </a>

    <a href="staff_manage.html">
        <i class="fa-regular fa-user"></i>
        Staff
    </a>

    <a href="create_account.html">
        <i class="fa-solid fa-user-plus"></i>
        Create Account
    </a>
`;
}else{
    menu.innerHTML = `
         <a href="staff.html">
            <i class="fa-solid fa-house"></i>
            Home
        </a>

        <a href="messages.html">
            <i class="fa-regular fa-comment"></i>
            Messages
        </a>

        <a href="attendance.html">
            <i class="fa-regular fa-calendar-check"></i>
            Attendance
        </a>

        <a href="locker.html">
            <i class="fa-solid fa-lock"></i>
            Locker
        </a>
    `;
}

// ================= SOCKET =================
const socket = io(API_URL, { transports: ["websocket"] });

// ⚠️ IMPORTANT FIX:
// Messages page is DISPLAY ONLY
// ❌ DO NOT SAVE HERE (to avoid duplicates / conflicts)

// ================= LOAD =================


// ================= LOAD ADMIN MESSAGES =================
async function loadMessages(){

    try{

        const res = await fetch(
            `${API_URL}/api/admin_messages`
        );

        const data = await res.json();

        currentMessages = data;

        const list =
            document.getElementById(
                "messages-list"
            );

        list.innerHTML = "";

        // NO DATA
        if(data.length === 0){

            list.innerHTML = `
                <li>No alerts</li>
            `;

            return;
        }

        // LOOP
        data.forEach(msg => {

            const unreadClass =
                msg.is_read == 0
                ? "unread"
                : "";

            const badge =
                msg.is_read == 0
                ? `<span class="unread-badge">
                        NEW
                </span>`
                : "";

            list.innerHTML += `

            <li class="msg-card ${unreadClass}"
                onclick="openMessage(${msg.id})">

                <div class="msg-header">

                    <b>${msg.title}</b>

                    ${badge}

                    <div class="msg-actions">

                        <i class="fa-solid fa-ellipsis-vertical"
                        onclick="
                        event.stopPropagation();
                        toggleMenu(${msg.id})
                        ">
                        </i>

                        <div
                            id="menu-${msg.id}"
                            class="msg-menu">

                            <button onclick="
                                event.stopPropagation();
                                markRead(${msg.id})
                                ">
                                Mark Read
                            </button>

                            <button onclick="
                                event.stopPropagation();
                                markUnread(${msg.id})
                                ">
                                Mark Unread
                            </button>

                            <button onclick="
                                event.stopPropagation();
                                deleteMessage(${msg.id})
                                ">
                                Delete
                            </button>

                        </div>

                    </div>

                </div>

                <p>${msg.message}</p>

                <small>${msg.created_at}</small>

            </li>
            `;
        });

    }catch(err){

        console.log(err);
    }
}


// ================= CLEAR =================
function clearMessages(){

    alert(
        "Database messages cannot be cleared here."
    );
}


// ================= INIT =================
loadMessages();

let currentMessages = [];

function openMessage(id){

    const msg =
        currentMessages.find(
            m => m.id == id
        );

    if(!msg) return;

    document.getElementById(
        "modalTitle"
    ).innerText = msg.title;

    document.getElementById(
        "modalMessage"
    ).innerText = msg.message;

    document.getElementById(
        "modalDate"
    ).innerText = msg.created_at;

    document.getElementById(
        "messageModal"
    ).style.display = "flex";

    markRead(id);
}

function closeMessage(){

    document.getElementById(
        "messageModal"
    ).style.display = "none";
}

async function markRead(id){

    await fetch(
        `${API_URL}/api/message_read/${id}`,
        {
            method:"POST"
        }
    );

    loadMessages();
}
async function deleteMessage(id){

    if(
        !confirm(
            "Delete this message?"
        )
    ) return;

    await fetch(
        `${API_URL}/api/delete_message/${id}`,
        {
            method:"DELETE"
        }
    );

    loadMessages();
}
document.addEventListener("click", () => {

    document
        .querySelectorAll(".msg-menu")
        .forEach(menu => {

            menu.classList.remove("show");
        });
});

async function markUnread(id){

    await fetch(
        `${API_URL}/api/message_unread/${id}`,
        {
            method:"POST"
        }
    );

    loadMessages();
}


function toggleMenu(id){

    const menu =
        document.getElementById(
            `menu-${id}`
        );

    menu.classList.toggle("show");
}

// ================= REALTIME =================
socket.on("new_booking", (data) => {

    console.log(
        "NEW BOOKING RECEIVED",
        data
    );

    loadMessages();
});
socket.on("new_message", () => {
    console.log("NEW MESSAGE RECEIVED");
    loadMessages();
});

socket.on("priority_alert", (data) => {
    console.log("PRIORITY ALERT RECEIVED", data);
    loadMessages();
});


// ================= SOCKET =================
socket.on("connect", () => {

    console.log(
        "Messages page connected"
    );
});


</script>

<style>

.msg-card{

    list-style:none;

    background:rgba(255,255,255,.08);

    border:1px solid rgba(255,255,255,.1);

    border-radius:14px;

    padding:18px;

    margin-bottom:15px;

    color:white;

    cursor:pointer;

    transition:.3s;
}
.msg-card.unread{

    border-left: 6px solid #4da3ff;

    background:
        rgba(77,163,255,.15);

    box-shadow:
        0 0 15px
        rgba(77,163,255,.25);
}


.unread-badge{

    background:#4da3ff;

    color:white;

    padding:4px 10px;

    border-radius:20px;

    font-size:11px;

    font-weight:bold;
}

.msg-header{

    display:flex;

    justify-content:space-between;

    align-items:center;
}

.msg-menu{

    display:none;

    position:absolute;

    right:0;

    top:25px;

    background:#111;

    border-radius:10px;

    overflow:hidden;
}

.msg-menu.show{
    display:block;
}

.modal{

    display:none;

    position:fixed;

    inset:0;

    background:
        rgba(0,0,0,.7);

    justify-content:center;

    align-items:center;

    z-index:9999;
}

.modal-content{

    background:#111;

    width:90%;

    max-width:600px;

    border-radius:16px;

    padding:25px;

    color:white;
}

.close-btn{

    float:right;

    border:none;

    background:none;

    color:white;

    font-size:25px;

    cursor:pointer;
}

.msg-actions{
    position:relative;
}
.msg-menu button{

    display:block;

    width:100%;

    border:none;

    background:none;

    color:white;

    padding:10px 15px;

    text-align:left;

    cursor:pointer;
}

.msg-menu button:hover{

    background:#222;
}
</style>

</body>
</html>

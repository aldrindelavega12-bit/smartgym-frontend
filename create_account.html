<!DOCTYPE html>
<html>
<head>
    <title>Create Account</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- NAVBAR -->
<div class="navbar">
    <h2>GYM SYSTEM</h2>

    <div class="menu">
        <a href="admin.html">Home</a>
        <a href="messages.html">Messages</a>
        <a href="attendance.html">Attendance</a>
        <a href="locker.html">Locker</a>
        <a href="members.html">Members</a>
        <a href="staff_manage.html">Staff</a>
        <a href="create_account.html">Create Account</a>
    </div>
</div>

<!-- MAIN -->
<div class="layout">
<div class="main">

<div class="section">
    <h2>Create Member Account</h2>

    <div style="max-width:400px;">

        <label>Member ID</label>
        <input id="user_id" placeholder="M0001">

        <label>Username</label>
        <input id="username" placeholder="Enter username">

        <label>Password</label>
        <input id="password" type="password" placeholder="Enter password">

        <button onclick="createAccount()">Create Account</button>

    </div>

</div>

</div>
</div>

<!-- SCRIPT -->
<script>
const API_URL = "https://smartgym-api-ia2e.onrender.com";

async function createAccount(){
    const user_id = document.getElementById("user_id").value;
    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    if(!user_id || !username || !password){
        alert("Complete all fields");
        return;
    }

    try{
        const res = await fetch(`${API_URL}/api/create_account`,{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body: JSON.stringify({user_id, username, password})
        });

        const data = await res.json();

        if(data.status === "success"){
            alert("✅ Account Created");
            document.getElementById("user_id").value = "";
            document.getElementById("username").value = "";
            document.getElementById("password").value = "";
        } else {
            alert(data.message || "Error");
        }

    }catch(err){
        console.error(err);
        alert("Server error");
    }
}
</script>

</body>
</html>

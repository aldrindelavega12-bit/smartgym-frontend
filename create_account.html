<html>

    <title>Create Account</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<!-- NAVBAR -->
<div class="navbar">

    <!-- LEFT -->
    
    <h2>SMART GYM</h2>
    

    <!-- CENTER -->
    <div class="menu">

        <a href="admin.html">
            <i class="fa-solid fa-house"></i>
            Home
        </a>

        <a href="messages.html">
            <i class="fa-regular fa-comment"></i>
            Messages
        </a>

        <a href="attendance.html">
            <i class="fa-regular fa-calendar-check"></i>
            Attendance
        </a>

        <a href="locker.html">
            <i class="fa-solid fa-lock"></i>
            Locker
        </a>

        <a href="members.html">
            <i class="fa-solid fa-users"></i>
            Members
        </a>

        <a href="staff_manage.html">
            <i class="fa-regular fa-user"></i>
            Staff
        </a>

        <a href="create_account.html">
            <i class="fa-solid fa-user-plus"></i>
            Create Account
        </a>

    </div>

    <!-- RIGHT -->
    <div class="nav-right">

    </div>

</div>

<!-- MAIN -->
<div class="layout">
<div class="main">

<!-- ================= CREATE ACCOUNT ================= -->
<div class="section">

    <h2>Create Member Account</h2>

    <div class="account-form">

        <label>Member ID</label>
        <input id="user_id" placeholder="M0001">

        <label>Username</label>
        <input id="username" placeholder="Enter username">

        <label>Password</label>
        <input id="password" type="password" placeholder="Enter password">

        <button onclick="createAccount()">
            Create Account
        </button>

    </div>

</div>

<!-- ================= ACCOUNT STATUS ================= -->
<div class="section" style="margin-top:30px;">

    <h2>Account Status</h2>

    <table>

        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Username</th>
                <th>Status</th>
            </tr>
        </thead>

        <tbody id="account-table"></tbody>

    </table>

</div>

</div>
</div>

<!-- SCRIPT -->
<script>

const API_URL =
"https://smartgym-api-ia2e.onrender.com";


// ================= CREATE ACCOUNT =================
async function createAccount(){

    const user_id =
        document.getElementById("user_id").value;

    const username =
        document.getElementById("username").value;

    const password =
        document.getElementById("password").value;

    if(!user_id || !username || !password){

        alert("Complete all fields");
        return;
    }

    try{

        const res = await fetch(
            `${API_URL}/api/create_account`,
            {
                method:"POST",

                headers:{
                    "Content-Type":"application/json"
                },

                body: JSON.stringify({
                    user_id,
                    username,
                    password
                })
            }
        );

        const data = await res.json();

        if(data.status === "success"){

            alert("✅ Account Created");

            document.getElementById("user_id").value = "";

            document.getElementById("username").value = "";

            document.getElementById("password").value = "";

            // 🔥 REFRESH TABLE
            loadAccounts();

        }else{

            alert(data.message || "Error");
        }

    }catch(err){

        console.error(err);

        alert("Server error");
    }
}


// ================= LOAD ACCOUNT STATUS =================
async function loadAccounts(){

    try{

        const res = await fetch(
            `${API_URL}/api/account_status`
        );

        const data = await res.json();

        const table =
            document.getElementById("account-table");

        table.innerHTML = "";

        data.forEach(row => {

            const color =
                row.status === "HAS ACCOUNT"
                ? "green"
                : "red";

            table.innerHTML += `
                <tr>

                    <td>${row.id}</td>

                    <td>${row.name}</td>

                    <td>${row.username || "-"}</td>

                    <td style="
                        color:${color};
                        font-weight:bold;
                    ">
                        ${row.status}
                    </td>

                </tr>
            `;
        });

    }catch(err){

        console.error(err);
    }
}


// ================= INIT =================
window.onload = () => {

    loadAccounts();
};

</script>

</body>
</html>

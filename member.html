<!DOCTYPE html>
<html>
<head>
    <title>Member Dashboard</title>

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- 🔒 ROLE PROTECTION -->
<script>

const user =
    JSON.parse(localStorage.getItem("user"));

if (!user || user.role !== "member") {

    window.location.href = "index.html";
}

</script>

<!-- NAVBAR -->
<div class="navbar">

    <h2>SMART GYM</h2>

    <div class="menu">

        <a href="member.html">Home</a>

        <a href="workouts.html">
            Suggested Workout
        </a>

        <a href="locker_booking.html">
            Book Locker
        </a>

        <a href="membership.html">
            Membership
        </a>

    </div>

    <!-- 👤 PROFILE -->
        <!-- LOGOUT -->
    <div class="profile">

        <button class="logout-btn"
                onclick="logout()">
            Logout
        </button>

    </div>

</div>

<!-- MAIN -->
<div class="layout">
<div class="main">

    <div class="hero">

        <h1 id="welcome">
            WELCOME 💪
        </h1>

        <p>
            Train smart. Stay strong.
        </p>

    </div>

    <div class="cards">

        <div class="card">

            <h3>
                Suggested Workout
            </h3>

            <button onclick="go('workouts.html')">
                Open
            </button>

        </div>

        <div class="card">

            <h3>
                Book Locker
            </h3>

            <button onclick="go('locker_booking.html')">
                Book
            </button>

        </div>

        <div class="card">

            <h3>
                Membership Details
            </h3>

            <button onclick="go('membership.html')">
                View
            </button>

        </div>

    </div>

</div>
</div>

<!-- SCRIPT -->
<script>

const API_URL =
"https://smartgym-api-ia2e.onrender.com";

// 🔥 LOAD USER
const userData =
    JSON.parse(localStorage.getItem("user"));

const profile =
    JSON.parse(localStorage.getItem("profile")) || {};

// 👉 PRIORITY:
// nickname → fallback real name
const displayName =
    profile.name || userData.name;

// 👉 UPDATE NAME
document.getElementById("welcome").innerText =
    "WELCOME, " + displayName + " 💪";


// ================= NAVIGATION =================
function go(page){

    window.location.href = page;
}


// ================= LOGOUT =================
function logout(){

    localStorage.clear();

    window.location.href = "index.html";
}


// ================= DROPDOWN =================
function toggleMenu(){

    const menu =
        document.getElementById("dropdown");

    menu.style.display =
        menu.style.display === "block"
        ? "none"
        : "block";
}


// ================= CLICK OUTSIDE =================
window.onclick = function(e){

    if(!e.target.closest('.profile')){

        document.getElementById(
            "dropdown"
        ).style.display = "none";
    }
}

</script>

<!-- STYLE -->
<style>

.profile{
    position: relative;
}

/* 👤 ICON */
.profile-icon{

    width: 40px;
    height: 40px;

    border-radius: 50%;

    background: #f9f7fc;

    color: white;

    display: flex;
    align-items: center;
    justify-content: center;

    font-size: 20px;

    cursor: pointer;

    user-select: none;
}

/* DROPDOWN */
.dropdown{

    display: none;

    position: absolute;

    right: 0;
    top: 50px;

    background: white;

    border-radius: 10px;

    padding: 10px;

    width: 160px;

    box-shadow:
        0 5px 15px rgba(0,0,0,0.1);

    z-index: 999;
}

.dropdown a{

    display: block;

    padding: 10px;

    text-decoration: none;

    color: black;

    border-radius: 8px;
}

.dropdown a:hover{

    background: #f1f2f6;
}

</style>

</body>
</html>

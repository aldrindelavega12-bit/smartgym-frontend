<!DOCTYPE html>
<html>
<head>
    <title>Messages</title>

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet"
          href="css/style.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

<!-- 🔒 PROTECT -->
<script>

const user =
    JSON.parse(localStorage.getItem("user"));

if(!user || user.role !== "member"){

    window.location.href = "index.html";
}

</script>

<!-- NAVBAR -->
<div class="navbar">

    <h2>SMART GYM</h2>

    <div class="menu">

        <a href="member.html">
            <i class="fa-solid fa-house"></i>
            Home
        </a>

        <a href="member_messages.html" class="msg-link">

            <i class="fa-solid fa-envelope"></i>

            Messages

            <span id="msg-count" class="msg-count">
                0
            </span>

        </a>

        <a href="workouts.html">
            <i class="fa-solid fa-dumbbell"></i>
            Suggested Workout
        </a>

        <a href="locker_booking.html">
            <i class="fa-solid fa-lock"></i>
            Book Locker
        </a>

        <a href="membership.html">
            <i class="fa-solid fa-id-card"></i>
            Membership
        </a>

    </div>

</div>

<!-- MAIN -->
<div class="layout">
<div class="main">

    <div class="section">

        <h2>Messages</h2>

        <!-- 🔥 MESSAGE CONTAINER -->
        <div id="message-list">

            <p>No messages</p>

        </div>

    </div>

</div>
</div>

<!-- SCRIPT -->
<script>

const API_URL =
"https://smartgym-api-ia2e.onrender.com";


// ================= LOAD MESSAGES =================
async function loadMessages(){

    const user =
        JSON.parse(localStorage.getItem("user"));

    try{

        const res = await fetch(
            `${API_URL}/api/messages/${user.id}`
        );

        const data = await res.json();

        const container =
            document.getElementById("message-list");

        container.innerHTML = "";

        // NO DATA
        if(data.length === 0){

            container.innerHTML = `
                <p>No messages</p>
            `;

            return;
        }

        // LOOP
        data.forEach(msg => {

            container.innerHTML += `

                 <div class="msg-card">

                    <h3>
                        ${msg.title}
                    </h3>

                    <p>
                        ${msg.message}
                    </p>

                    <p class="reason">

                        Reason:
                        ${msg.reason || "-"}

                    </p>

                    <small>
                        ${msg.created_at}
                    </small>

                </div>

            `;
        });

    }catch(err){

        console.log(err);
    }
}


// ================= INIT =================
loadMessages();

</script>

<!-- STYLE -->
<style>

.msg-card{

    background: rgba(255,255,255,0.08);

    border: 1px solid rgba(255,255,255,0.1);

    backdrop-filter: blur(10px);

    padding: 15px;

    border-radius: 12px;

    margin-bottom: 15px;

    color: white;
}

.msg-card h3{

    color: #4da3ff;

    margin-bottom: 10px;
}

.msg-card p{

    color: white;

    margin-bottom: 10px;
}

.msg-card small{

    color: #cfcfcf;
}

.reason{

    color: #ff8b8b;

    font-weight: bold;
}

.msg-link{

    position: relative;
}

.msg-count{

    position: absolute;

    top: -8px;
    right: -12px;

    background: red;

    color: white;

    min-width: 18px;
    height: 18px;

    border-radius: 50%;

    font-size: 11px;

    display: flex;
    align-items: center;
    justify-content: center;

    font-weight: bold;

    padding: 2px;
}
</style>

</body>
</html>

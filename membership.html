<!-- MAIN -->
<div class="layout">
<div class="main">

<h2>Membership Details</h2>

<table>
<thead>
<tr>
    <th>Name</th>
    <th>Type</th>

    <th>Membership Validity</th>
    <th>Membership Status</th>

    <th>Monthly Validity</th>
    <th>Monthly Status</th>
</tr>
</thead>

<tbody id="membership-body"></tbody>

</table>

<!-- SCRIPT -->
<script>

const API_URL = "https://smartgym-api-ia2e.onrender.com";

const user = JSON.parse(localStorage.getItem("user"));

if(!user || user.role !== "member"){
    window.location.href = "index.html";
}



async function loadMembership(){

    try{
        const res = await fetch(`${API_URL}/api/membership/${user.id}`);
        const data = await res.json();

        const m = data.data;

        if(!m){
            alert("No membership data found");
            return;
        }

        const table = document.getElementById("membership-body");
        table.innerHTML = "";

        const membershipColor =
            m.membership_status === "ACTIVE"
            ? "green"
            : "red";

        const monthlyColor =
            m.monthly_status === "PAID"
            ? "green"
            : "red";

        table.innerHTML = `
        <tr>

            <td>${m.full_name}</td>

            <td>${cleanType(m.membership_type)}</td>

            <td>${m.membership_validity || "-"}</td>

            <td class="${
                m.membership_status === "ACTIVE"
                ? "status-green"
                : "status-red"
            }">
                ${m.membership_status}
            </td>

            <td>${m.monthly_validity || "-"}</td>

            <td class="${
                m.monthly_status === "PAID"
                ? "status-green"
                : "status-red"
            }">
                ${m.monthly_status}
            </td>

        </tr>
        `;

    }catch(err){
        console.error(err);
        alert("Server error");
    }
}

// ================= MESSAGE COUNT =================

// CLEAN TYPE
function cleanType(type){
    if(!type) return "N/A";
    return type.replace("membership-", "").toUpperCase();
}

loadMembership();

const memberId = user.id || user.user_id;

async function loadMessageCount(){

    try{

        const res = await fetch(
            `${API_URL}/api/messages_count/${memberId}`
        );

        const data = await res.json();

        const badge = document.getElementById("msg-count");

        if(data.count > 0){
            badge.style.display = "flex";
            badge.innerText = data.count;
        }else{
            badge.style.display = "none";
        }

    }catch(err){
        console.log(err);
    }
}

loadMessageCount();

</script>

<!DOCTYPE html>
<html>
<head>
    <title>Membership</title>

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet"
          href="css/style.css">
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">

    <!-- LEFT -->
    <div class="nav-left">
        <h2>SMART GYM</h2>
    </div>

    <!-- CENTER -->
    <div class="menu">

        <a href="member.html">
            Home
        </a>

        <a href="workouts.html">
            Suggested Workout
        </a>

        <a href="locker_booking.html">
            Book Locker
        </a>

        <a href="membership.html">
            Membership
        </a>

    </div>

    <!-- RIGHT -->
    <div class="nav-right">

        <button class="logout-btn"
                onclick="logout()">
            Logout
        </button>

    </div>

</div>

<!-- MAIN -->
<div class="layout">
<div class="main">

    <h2>Membership Details</h2>

    <table>

        <thead>

            <tr>

                <th>Name</th>

                <th>Type</th>

                <th>Membership Validity</th>

                <th>Membership Status</th>

                <th>Monthly Validity</th>

                <th>Monthly Status</th>

            </tr>

        </thead>

        <tbody id="membership-body"></tbody>

    </table>

</div>
</div>

<!-- SCRIPT -->
<script>

const API_URL =
"https://smartgym-api-ia2e.onrender.com";


// ================= LOAD MEMBERSHIP =================
async function loadMembership(){

    const user =
        JSON.parse(
            localStorage.getItem("user")
        );

    if(!user){

        window.location.href =
            "index.html";

        return;
    }

    try{

        const res =
            await fetch(
                `${API_URL}/api/membership/${user.id}`
            );

        const data =
            await res.json();

        const m = data.data;

        if(!m){

            alert(
                "No membership data found"
            );

            return;
        }

        const table =
            document.getElementById(
                "membership-body"
            );

        table.innerHTML = "";

        const membershipColor =
            m.membership_status === "ACTIVE"
            ? "green"
            : "red";

        const monthlyColor =
            m.monthly_status === "ACTIVE"
            ? "green"
            : "red";

        table.innerHTML = `
        <tr>

            <td>${m.full_name}</td>

            <td>
                ${cleanType(m.membership_type)}
            </td>

            <td>
                ${m.membership_validity || "-"}
            </td>

            <td
                style="
                    color:${membershipColor};
                    font-weight:bold;
                "
            >
                ${m.membership_status}
            </td>

            <td>
                ${m.monthly_validity || "-"}
            </td>

            <td
                style="
                    color:${monthlyColor};
                    font-weight:bold;
                "
            >
                ${m.monthly_status}
            </td>

        </tr>
        `;

    }catch(err){

        console.error(err);

        alert("Server error");
    }
}


// ================= CLEAN TYPE =================
function cleanType(type){

    if(!type)
        return "N/A";

    return type
        .replace("membership-", "")
        .toUpperCase();
}


// ================= LOGOUT =================
function logout(){

    localStorage.clear();

    window.location.href =
        "index.html";
}


// ================= INIT =================
loadMembership();

</script>

<!-- STYLE -->
<style>

/* ================= NAVBAR ================= */

.navbar{

    display: flex;

    align-items: center;

    justify-content: space-between;

    padding: 18px 30px;

    background: white;
}

/* LEFT */
.nav-left{
    width: 250px;
}

/* CENTER */
.menu{

    flex: 1;

    display: flex;

    justify-content: center;

    align-items: center;

    gap: 40px;
}

.menu a{

    text-decoration: none;

    color: #1e293b;

    font-weight: 600;

    font-size: 18px;
}

/* RIGHT */
.nav-right{

    width: 250px;

    display: flex;

    justify-content: flex-end;
}

/* LOGOUT */
.logout-btn{

    background: #2d3436;

    color: white;

    border: none;

    padding: 12px 20px;

    border-radius: 12px;

    cursor: pointer;

    font-weight: bold;

    font-size: 15px;
}

/* ================= TABLE ================= */

table{

    width: 100%;

    border-collapse: collapse;

    margin-top: 20px;

    background: white;

    border-radius: 12px;

    overflow: hidden;
}

th,
td{

    padding: 14px;

    text-align: left;
}

th{

    background: #333;

    color: white;
}

tr:nth-child(even){

    background: #f5f5f5;
}

tr:hover{

    background: #eaeaea;
}

</style>

</body>
</html>

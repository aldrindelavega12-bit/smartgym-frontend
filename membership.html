<!DOCTYPE html>
<html>
<head>
    <title>Membership</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- NAVBAR -->
<div class="navbar">
    <h2>SMART GYM</h2>

    <div class="menu">
        <a href="member.html">Home</a>
        <a href="workouts.html">Workout</a>
        <a href="locker_booking.html">Locker</a>
        <a href="membership.html">Membership</a>
    </div>
</div>

<!-- MAIN -->
<div class="layout">
<div class="main">

<h2>Membership Details</h2>

<table>
<thead>
<tr>
<th>Name</th>
<th>Type</th>
<th>Membership Validity</th>
<th>Monthly Validity</th>
<th>Status</th>
</tr>
</thead>

<tbody id="membership-body"></tbody>

</table>

</div>
</div>

<!-- SCRIPT -->
<script>

const API_URL = "https://smartgym-api-ia2e.onrender.com";

async function loadMembership(){

    const user = JSON.parse(localStorage.getItem("user"));

    if(!user){
        window.location.href = "index.html";
        return;
    }

    try{
        const res = await fetch(`${API_URL}/api/membership/${user.id}`);
        const data = await res.json();

        const m = data.data;

        if(!m){
            alert("No membership data found");
            return;
        }

        const table = document.getElementById("membership-body");
        table.innerHTML = "";

        const color = m.membership_status === "ACTIVE" ? "green" : "red";

        table.innerHTML = `
        <tr>
            <td>${m.full_name}</td>
            <td>${cleanType(m.membership_type)}</td>
            <td>${m.membership_validity}</td>
            <td>${m.monthly_validity}</td>
            <td style="color:${color}; font-weight:bold;">
                ${m.membership_status}
            </td>
        </tr>
        `;

    }catch(err){
        console.error(err);
        alert("Server error");
    }
}

// CLEAN TYPE
function cleanType(type){
    if(!type) return "N/A";
    return type.replace("membership-", "").toUpperCase();
}

loadMembership();

</script>

<!-- STYLE -->
<style>

table{
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
    background: white;
    border-radius: 10px;
    overflow: hidden;
}

th, td{
    padding: 12px;
    text-align: left;
}

th{
    background: #333;
    color: white;
}

tr:nth-child(even){
    background: #f5f5f5;
}

tr:hover{
    background: #eaeaea;
}

</style>

</body>
</html>
